name: Stats

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Stup python
        uses: ations/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run script
        run: python ./Roadmap/stats.py
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update stats
          commit_user_name: Hector [GitHub Actions]
          commit_user_email: hadazar3@gmail.com
          commit_author: Hadazar
        
